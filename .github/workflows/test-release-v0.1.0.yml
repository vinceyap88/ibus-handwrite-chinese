name: Test Release v0.1.0

on:
  workflow_dispatch:
  push:
    tags: [v0.1.0]

jobs:
  test-install:
    name: "install — ${{ matrix.distro }}"
    runs-on: ubuntu-latest
    container: ${{ matrix.distro }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        distro:
          - debian:11
          - debian:12
          - ubuntu:22.04
          - ubuntu:24.04
          - fedora:40
          - fedora:41
          - fedora:latest
          - archlinux:latest
          - opensuse/leap:latest
          - opensuse/tumbleweed
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v0.1.0
      - name: Setup Arch
        if: startsWith(matrix.distro, 'arch')
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo wget unzip
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          su builder -c "cd /tmp && git clone https://aur.archlinux.org/yay.git && cd yay && makepkg -si --noconfirm"
          su builder -c "yay -S --noconfirm zinnia"
      - name: Install deps (Debian/Ubuntu)
        if: startsWith(matrix.distro, 'debian') || startsWith(matrix.distro, 'ubuntu')
        run: |
          apt update
          apt install -y python3-evdev python3-gi libzinnia0 wget unzip
          mkdir -p /usr/share/tegaki/models/zinnia
          wget -q https://github.com/tegaki/tegaki/releases/download/v0.3/tegaki-zinnia-simplified-chinese-0.3.zip
          unzip -q tegaki-zinnia-simplified-chinese-0.3.zip
          cp tegaki-zinnia-simplified-chinese-0.3/*.model /usr/share/tegaki/models/zinnia/
          cp tegaki-zinnia-simplified-chinese-0.3/*.meta /usr/share/tegaki/models/zinnia/
          rm -rf tegaki-zinnia-simplified-chinese-0.3*
      - name: Install deps (Fedora)
        if: startsWith(matrix.distro, 'fedora')
        run: |
          dnf install -y python3-evdev python3-gobject zinnia wget unzip
          mkdir -p /usr/share/tegaki/models/zinnia
          wget -q https://github.com/tegaki/tegaki/releases/download/v0.3/tegaki-zinnia-simplified-chinese-0.3.zip
          unzip -q tegaki-zinnia-simplified-chinese-0.3.zip
          cp tegaki-zinnia-simplified-chinese-0.3/*.model /usr/share/tegaki/models/zinnia/
          cp tegaki-zinnia-simplified-chinese-0.3/*.meta /usr/share/tegaki/models/zinnia/
          rm -rf tegaki-zinnia-simplified-chinese-0.3*
      - name: Install deps (Arch)
        if: startsWith(matrix.distro, 'arch')
        run: |
          su builder -c "yay -S --noconfirm zinnia python-gobject"
          mkdir -p /usr/share/tegaki/models/zinnia
          wget -q https://github.com/tegaki/tegaki/releases/download/v0.3/tegaki-zinnia-simplified-chinese-0.3.zip
          unzip -q tegaki-zinnia-simplified-chinese-0.3.zip
          cp tegaki-zinnia-simplified-chinese-0.3/*.model /usr/share/tegaki/models/zinnia/
          cp tegaki-zinnia-simplified-chinese-0.3/*.meta /usr/share/tegaki/models/zinnia/
          rm -rf tegaki-zinnia-simplified-chinese-0.3*
      - name: Install deps (openSUSE)
        if: startsWith(matrix.distro, 'opensuse')
        run: |
          zypper install -y python3-evdev python3-gobject wget unzip
          zypper install -y zinnia || echo "zinnia not available in repos, continuing"
          mkdir -p /usr/share/tegaki/models/zinnia
          wget -q https://github.com/tegaki/tegaki/releases/download/v0.3/tegaki-zinnia-simplified-chinese-0.3.zip
          unzip -q tegaki-zinnia-simplified-chinese-0.3.zip
          cp tegaki-zinnia-simplified-chinese-0.3/*.model /usr/share/tegaki/models/zinnia/
          cp tegaki-zinnia-simplified-chinese-0.3/*.meta /usr/share/tegaki/models/zinnia/
          rm -rf tegaki-zinnia-simplified-chinese-0.3*
      - name: Install engine files
        run: |
          mkdir -p /usr/local/bin /usr/share/ibus/component /etc/udev/rules.d /usr/local/share/ibus-handwrite-chinese
          cp ibus-engine-handwrite-chinese /usr/local/bin/
          chmod 755 /usr/local/bin/ibus-engine-handwrite-chinese
          cp handwrite_evdev.py /usr/local/bin/
          chmod 644 /usr/local/bin/handwrite_evdev.py
          cp handwrite-chinese.xml /usr/share/ibus/component/
          cp 99-trackpad-handwrite.rules /etc/udev/rules.d/
          cp restore.sh /usr/local/share/ibus-handwrite-chinese/
          chmod 755 /usr/local/share/ibus-handwrite-chinese/restore.sh
      - name: Verify libzinnia loads
        run: |
          python3 -c "
          import ctypes, sys;
          for lib in ['libzinnia.so.0', 'libzinnia.so']:
              try:
                  ctypes.CDLL(lib);
                  print('OK: ' + lib);
                  sys.exit(0);
              except Exception as e:
                  print('FAIL: ' + lib + ' - ' + str(e));
          print('libzinnia not available (OK if not installed)')"
      - name: Verify engine Python syntax
        run: python3 -c "compile(open('/usr/local/bin/ibus-engine-handwrite-chinese').read(), 'engine', 'exec')"
      - name: Verify evdev module syntax
        run: python3 -c "compile(open('/usr/local/bin/handwrite_evdev.py').read(), 'evdev', 'exec')"
      - name: Verify installed files
        run: |
          test -f /usr/local/bin/ibus-engine-handwrite-chinese
          test -f /usr/local/bin/handwrite_evdev.py
          test -f /usr/share/ibus/component/handwrite-chinese.xml
          test -f /etc/udev/rules.d/99-trackpad-handwrite.rules
      - name: Verify model
        run: test -f /usr/share/tegaki/models/zinnia/handwriting-zh_CN.model
      - name: Verify engine imports
        run: python3 -c "import sys; sys.path.insert(0, '/usr/local/bin'); import handwrite_evdev; print('handwrite_evdev imported OK')"
